apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-sre-ingress
  namespace: ai-sre
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: "ai-sre.example.com"
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
