apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  namespace: ai-sre
  labels:
    app: workers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workers
  template:
    metadata:
      labels:
        app: workers
    spec:
      containers:
      - name: worker
        image: backend:latest
        command:
        - python
        - -m
        - celery
        - -A
        - app.workers
        - worker
        # TODO: Configure worker settings
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
